<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reconstruction 3D — Blocs Temps Reel</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #101014; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 10px; left: 12px; z-index: 10;
      color: #e6e6e6; font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace;
      background: rgba(0,0,0,.35); padding: 8px 12px; border-radius: 8px;
      pointer-events: none; user-select: none;
    }
    #hud b { color: #33ccff; }
    #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #e05a5a; vertical-align: middle; }
    #dot.on { background: #4ad06a; }
  </style>

  <!-- Client Socket.io servi automatiquement par le serveur (version alignee) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Three.js via CDN (ES modules + importmap) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <span id="dot"></span> <span id="state">Connexion…</span> &nbsp;|&nbsp; Blocs : <b id="count">0</b>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Connexion auto (compatible HTTP et HTTPS/WSS grace au chemin relatif)
    const socket = io();

    const VOXEL = 0.05;          // taille d'un bloc : 5 cm
    const INV_VOXEL = 1 / VOXEL;
    let capacity = 200000;       // capacite initiale de l'InstancedMesh (blocs)

    // ---- Scene / Camera / Renderer -------------------------------------
    const container = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101014);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    camera.position.set(3, 2.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Eclairage : ambiant + directionnel -> les faces des cubes s'ombrent
    // differemment (aspect volumetrique facon Minecraft).
    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const dir = new THREE.DirectionalLight(0xffffff, 0.9);
    dir.position.set(1, 2, 1.5);
    scene.add(dir);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.35);
    dir2.position.set(-1, -0.5, -1);
    scene.add(dir2);

    scene.add(new THREE.AxesHelper(0.5));
    const grid = new THREE.GridHelper(12, 24, 0x444455, 0x24242c);
    scene.add(grid);

    // ---- Grille de voxels (InstancedMesh de cubes) ---------------------
    const boxGeom = new THREE.BoxGeometry(VOXEL, VOXEL, VOXEL);
    const boxMat = new THREE.MeshLambertMaterial({ vertexColors: false });

    let mesh = new THREE.InstancedMesh(boxGeom, boxMat, capacity);
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    mesh.count = 0;
    mesh.frustumCulled = false;
    scene.add(mesh);

    // Etat des voxels : cle "ix,iy,iz" -> index d'instance
    const voxelIndex = new Map();
    // Accumulateurs de couleur par voxel (moyenne des couleurs des points tombes dedans)
    let sumR = new Float32Array(capacity);
    let sumG = new Float32Array(capacity);
    let sumB = new Float32Array(capacity);
    let cnt  = new Uint32Array(capacity);
    let occupied = 0;

    const bboxMin = new THREE.Vector3(Infinity, Infinity, Infinity);
    const bboxMax = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
    let fitted = false;

    const dummy = new THREE.Object3D();
    const tmpColor = new THREE.Color();
    const countEl = document.getElementById('count');

    function growCapacity() {
      const newCap = capacity * 2;
      const newMesh = new THREE.InstancedMesh(boxGeom, boxMat, newCap);
      newMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      newMesh.count = occupied;
      newMesh.frustumCulled = false;
      // Recopie des matrices et couleurs existantes
      for (let i = 0; i < occupied; i++) {
        mesh.getMatrixAt(i, dummy.matrix);
        newMesh.setMatrixAt(i, dummy.matrix);
      }
      if (mesh.instanceColor) {
        newMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(newCap * 3), 3);
        newMesh.instanceColor.array.set(mesh.instanceColor.array.subarray(0, occupied * 3));
      }
      scene.remove(mesh);
      mesh.dispose();
      mesh = newMesh;
      scene.add(mesh);

      const nR = new Float32Array(newCap); nR.set(sumR); sumR = nR;
      const nG = new Float32Array(newCap); nG.set(sumG); sumG = nG;
      const nB = new Float32Array(newCap); nB.set(sumB); sumB = nB;
      const nC = new Uint32Array(newCap);  nC.set(cnt);  cnt  = nC;
      capacity = newCap;
    }

    // Ajoute un point (x,y,z en metres, r,g,b en 0..255) a la grille de voxels.
    function addPoint(x, y, z, r, g, b) {
      if (!(Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(z))) return;
      const ix = Math.floor(x * INV_VOXEL);
      const iy = Math.floor(y * INV_VOXEL);
      const iz = Math.floor(z * INV_VOXEL);
      const key = ix + ',' + iy + ',' + iz;

      let idx = voxelIndex.get(key);
      if (idx === undefined) {
        if (occupied >= capacity) growCapacity();
        idx = occupied++;
        voxelIndex.set(key, idx);
        // Position du bloc = centre de la cellule
        dummy.position.set((ix + 0.5) * VOXEL, (iy + 0.5) * VOXEL, (iz + 0.5) * VOXEL);
        dummy.rotation.set(0, 0, 0);
        dummy.updateMatrix();
        mesh.setMatrixAt(idx, dummy.matrix);
        mesh.count = occupied;
        mesh.instanceMatrix.needsUpdate = true;

        const cx = (ix + 0.5) * VOXEL, cy = (iy + 0.5) * VOXEL, cz = (iz + 0.5) * VOXEL;
        if (cx < bboxMin.x) bboxMin.x = cx; if (cx > bboxMax.x) bboxMax.x = cx;
        if (cy < bboxMin.y) bboxMin.y = cy; if (cy > bboxMax.y) bboxMax.y = cy;
        if (cz < bboxMin.z) bboxMin.z = cz; if (cz > bboxMax.z) bboxMax.z = cz;
      }
      // Moyenne cumulative de la couleur
      sumR[idx] += r; sumG[idx] += g; sumB[idx] += b; cnt[idx] += 1;
      const c = cnt[idx];
      tmpColor.setRGB(sumR[idx] / c / 255, sumG[idx] / c / 255, sumB[idx] / c / 255);
      mesh.setColorAt(idx, tmpColor);
      mesh.instanceColor.needsUpdate = true;
    }

    // ---- Decodage des lots recus ---------------------------------------
    // Format binaire : [uint32 N][N x 3 float32 xyz][N x 3 uint8 rgb], little-endian.
    function addBinary(buf) {
      const dv = new DataView(buf);
      if (dv.byteLength < 4) return;
      const n = dv.getUint32(0, true);
      const posOff = 4;
      const colOff = 4 + 12 * n;
      if (dv.byteLength < colOff + 3 * n) return; // lot tronque
      for (let i = 0; i < n; i++) {
        const x = dv.getFloat32(posOff + i * 12, true);
        const y = dv.getFloat32(posOff + i * 12 + 4, true);
        const z = dv.getFloat32(posOff + i * 12 + 8, true);
        const r = dv.getUint8(colOff + i * 3);
        const g = dv.getUint8(colOff + i * 3 + 1);
        const b = dv.getUint8(colOff + i * 3 + 2);
        addPoint(x, y, z, r, g, b);
      }
    }

    // Repli : ancien format JSON ([x,y,z] ou [x,y,z,r,g,b] ou {x,y,z,...}).
    function addJson(data) {
      if (data && data.points) data = data.points;
      if (!Array.isArray(data)) return;
      if (typeof data[0] === 'number') {
        for (let i = 0; i + 2 < data.length; i += 3) addPoint(data[i], data[i + 1], data[i + 2], 180, 180, 180);
        return;
      }
      for (const p of data) {
        if (Array.isArray(p)) addPoint(p[0], p[1], p[2], p[3] ?? 180, p[4] ?? 180, p[5] ?? 180);
        else if (p && typeof p === 'object') addPoint(p.x, p.y, p.z, p.r ?? 180, p.g ?? 180, p.b ?? 180);
      }
    }

    socket.on('draw_points', (data) => {
      if (data instanceof ArrayBuffer) addBinary(data);
      else if (ArrayBuffer.isView(data)) addBinary(data.buffer);
      else addJson(data);

      countEl.textContent = occupied;
      if (!fitted && occupied > 0) { fitToScene(); fitted = true; }
    });

    // ---- Recadrage camera sur la reconstruction ------------------------
    function fitToScene() {
      if (occupied === 0 || !Number.isFinite(bboxMin.x)) return;
      const center = new THREE.Vector3().addVectors(bboxMin, bboxMax).multiplyScalar(0.5);
      const size = new THREE.Vector3().subVectors(bboxMax, bboxMin);
      const radius = Math.max(size.length() * 0.5, VOXEL * 4);
      const dist = (radius / Math.sin(THREE.MathUtils.degToRad(camera.fov * 0.5))) * 1.25;
      const d = new THREE.Vector3(1, 0.6, 1).normalize();
      controls.target.copy(center);
      camera.position.copy(center).addScaledVector(d, dist);
      camera.near = Math.max(dist / 1000, 0.001);
      camera.far = dist * 100 + radius * 10;
      camera.updateProjectionMatrix();
      controls.update();
    }

    function clearScene() {
      voxelIndex.clear();
      occupied = 0;
      mesh.count = 0;
      mesh.instanceMatrix.needsUpdate = true;
      if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
      sumR.fill(0); sumG.fill(0); sumB.fill(0); cnt.fill(0);
      bboxMin.set(Infinity, Infinity, Infinity);
      bboxMax.set(-Infinity, -Infinity, -Infinity);
      fitted = false;
      countEl.textContent = 0;
    }

    // Raccourcis : R = recadrer, C = effacer
    addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'r') fitToScene();
      else if (k === 'c') clearScene();
    });

    // ---- Etat de connexion (HUD) ---------------------------------------
    const dot = document.getElementById('dot');
    const stateEl = document.getElementById('state');
    socket.on('connect',    () => { dot.classList.add('on');    stateEl.textContent = 'Connecte'; });
    socket.on('disconnect', () => { dot.classList.remove('on'); stateEl.textContent = 'Deconnecte'; });

    // ---- Boucle de rendu & resize --------------------------------------
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
