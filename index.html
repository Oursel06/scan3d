<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nuage de Points 3D — Temps Reel</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #101014; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 10px; left: 12px; z-index: 10;
      color: #e6e6e6; font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace;
      background: rgba(0,0,0,.35); padding: 8px 12px; border-radius: 8px;
      pointer-events: none; user-select: none;
    }
    #hud b { color: #33ccff; }
    #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #e05a5a; vertical-align: middle; }
    #dot.on { background: #4ad06a; }
  </style>

  <!-- Client Socket.io servi automatiquement par le serveur (version alignee) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Three.js via CDN (ES modules + importmap) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <span id="dot"></span> <span id="state">Connexion…</span> &nbsp;|&nbsp; Points : <b id="count">0</b>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Connexion auto (compatible HTTP et HTTPS/WSS grace au chemin relatif)
    const socket = io();

    const MAX_POINTS = 500000; // capacite du buffer pre-alloue

    // ---- Scene / Camera / Renderer -------------------------------------
    const container = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101014);

    // Les points ARCore sont en METRES (repere monde) : scene a l'echelle metrique.
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    camera.position.set(2, 1.5, 3); // ~3,5 m de l'origine

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Reperes a l'echelle metrique : axes de 1 m + grille de 10x10 m (mailles de 0,5 m)
    scene.add(new THREE.AxesHelper(1));
    const grid = new THREE.GridHelper(10, 20, 0x444455, 0x2a2a34);
    scene.add(grid);

    // ---- Geometrie de points pre-allouee (optimisee) ------------------
    const positions = new Float32Array(MAX_POINTS * 3);
    const posAttr = new THREE.BufferAttribute(positions, 3);
    posAttr.setUsage(THREE.DynamicDrawUsage); // buffer mis a jour souvent

    const colors = new Float32Array(MAX_POINTS * 3); // couleur RGB par point (0..1)
    const colAttr = new THREE.BufferAttribute(colors, 3);
    colAttr.setUsage(THREE.DynamicDrawUsage);

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', posAttr);
    geometry.setAttribute('color', colAttr);
    geometry.setDrawRange(0, 0); // on ne dessine que les points recus

    // Couleur reelle par point (vertexColors) ; taille en metres avec attenuation
    // perspective pour un rendu plus realiste (points proches plus gros).
    let pointSize = 0.012; // ~1,2 cm
    const material = new THREE.PointsMaterial({
      size: pointSize, vertexColors: true, sizeAttenuation: true
    });
    const cloud = new THREE.Points(geometry, material);
    scene.add(cloud);

    const DEFAULT_COLOR = [0.20, 0.80, 1.0]; // cyan de repli si aucune couleur transmise

    let count = 0;           // nombre de points actuellement affiches
    let fitted = false;      // recadrage auto effectue au premier nuage ?
    const countEl = document.getElementById('count');

    // Parse l'entree en { pos:[x,y,z,...], col:[r,g,b,...] } (couleurs normalisees 0..1).
    // Accepte [x,y,z] ou [x,y,z,r,g,b] (r,g,b en 0..255) et {x,y,z,r,g,b}.
    function parsePoints(data) {
      if (!data) return null;
      if (data.points) data = data.points;       // { points: [...] }
      if (!Array.isArray(data)) return null;
      const pos = [], col = [];
      const push = (x, y, z, r, g, b) => {
        if (!(Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(z))) return;
        pos.push(x, y, z);
        if (Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b))
          col.push(r / 255, g / 255, b / 255);
        else
          col.push(DEFAULT_COLOR[0], DEFAULT_COLOR[1], DEFAULT_COLOR[2]);
      };
      if (typeof data[0] === 'number') {          // deja plat [x,y,z,...]
        for (let i = 0; i + 2 < data.length; i += 3) push(data[i], data[i + 1], data[i + 2]);
        return { pos, col };
      }
      for (const p of data) {
        if (Array.isArray(p)) push(p[0], p[1], p[2], p[3], p[4], p[5]);
        else if (p && typeof p === 'object') push(p.x, p.y, p.z, p.r, p.g, p.b);
      }
      return { pos, col };
    }

    // Recadre la camera sur l'ensemble du nuage courant.
    function fitToCloud() {
      if (!count) return;
      geometry.computeBoundingSphere();
      const s = geometry.boundingSphere;
      if (!s || !Number.isFinite(s.radius) || s.radius <= 0) return;
      const r = s.radius, c = s.center;
      const dist = (r / Math.sin(THREE.MathUtils.degToRad(camera.fov * 0.5))) * 1.3;
      const dir = new THREE.Vector3(1, 0.6, 1).normalize();
      controls.target.copy(c);
      camera.position.copy(c).addScaledVector(dir, dist);
      camera.near = Math.max(dist / 1000, 0.001);
      camera.far = dist * 100 + r * 10;
      camera.updateProjectionMatrix();
      controls.update();
    }

    function clearCloud() {
      count = 0;
      fitted = false;
      geometry.setDrawRange(0, 0);
      posAttr.needsUpdate = true;
      colAttr.needsUpdate = true;
      countEl.textContent = 0;
    }

    // Reception temps reel -> ajout des points (+ couleurs) a la geometrie
    socket.on('draw_points', (data) => {
      const parsed = parsePoints(data);
      if (!parsed) return;
      let n = Math.floor(parsed.pos.length / 3);
      if (!n) return;

      if (count + n > MAX_POINTS) { count = 0; fitted = false; } // buffer plein -> on repart de zero
      n = Math.min(n, MAX_POINTS - count);

      positions.set(parsed.pos.slice(0, n * 3), count * 3);
      colors.set(parsed.col.slice(0, n * 3), count * 3);
      count += n;

      posAttr.needsUpdate = true;                 // renvoi des buffers au GPU
      colAttr.needsUpdate = true;
      geometry.setDrawRange(0, count);
      countEl.textContent = count;

      // Recadrage automatique des le tout premier nuage recu.
      if (!fitted) { fitToCloud(); fitted = true; }
    });

    // Raccourcis : R = recadrer, C = effacer, +/- = taille des points
    addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'r') fitToCloud();
      else if (k === 'c') clearCloud();
      else if (k === '+' || k === '=') { pointSize = Math.min(pointSize * 1.25, 1); material.size = pointSize; }
      else if (k === '-') { pointSize = Math.max(pointSize / 1.25, 0.001); material.size = pointSize; }
    });

    // ---- Etat de connexion (HUD) ---------------------------------------
    const dot = document.getElementById('dot');
    const stateEl = document.getElementById('state');
    socket.on('connect',    () => { dot.classList.add('on');    stateEl.textContent = 'Connecte'; });
    socket.on('disconnect', () => { dot.classList.remove('on'); stateEl.textContent = 'Deconnecte'; });

    // ---- Boucle de rendu & resize --------------------------------------
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
