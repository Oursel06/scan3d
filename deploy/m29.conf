# Déploiement m29 — scan3d.cube3d.fr (relais 3D temps réel)
# Source : /home/jordi/M2-9/Scan3d (symlink ~/M2-9/scan3d → Scan3d, requis par load_conf)
PROJECT=scan3d
STRATEGY=symlink
REMOTE=localhost
REMOTE_DIR="/home/jordi/scan3d"
SERVICE="scan3d"
# Aucun build : juste les deps de prod (express + socket.io).
# --omit=dev exclut socket.io-client, présent en devDep pour tools/e2e.js.
BUILD_CMD="npm ci --omit=dev"
# App entièrement stateless (relais mémoire, aucune persistance) : rien à partager
# entre releases hormis le fichier d'environnement qui porte le token.
SHARED_PATHS=(".env.local")
# Aucune base de données (relais mémoire) — mais db.sh tourne sous `set -u`,
# donc la variable doit être déclarée même vide.
DB_FILES=()
KEEP_RELEASES=5
